<header class="site-header py-3">
  <nav class="navbar navbar-expand-md">
    <div class="container d-flex align-items-center justify-content-between">
      <a class="navbar-brand" routerLink="/home">
        <img src="img/logo_png.png" alt="Slow Coffee" height="50">
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="Alternar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-2 align-items-center">
          @for (link of links; track link.nombre) {
            <li class="nav-item">
              <a [routerLink]="link.url" routerLinkActive="active" class="nav-link">{{ link.nombre }}</a>
            </li>
          }

          <li class="nav-item ms-md-3">
            <a class="btn btn-outline-dark position-relative rounded-pill px-3" routerLink="/checkout">
              Carrito
              <span *ngIf="cantidadCarrito > 0"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                {{ cantidadCarrito }}
              </span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
