<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 bg-white p-5 rounded-4 shadow-sm">
      <h2 class="font-serif mb-4 text-center text-terracotta">Crear Cuenta</h2>
      <form (ngSubmit)="onSubmit()">
        <div class="row g-3 mb-3">
          <div class="col">
            <label class="form-label fw-bold">Nombre</label>
            <input type="text" class="form-control" [(ngModel)]="nombre" name="nombre">
          </div>
          <div class="col">
            <label class="form-label fw-bold">Apellidos</label>
            <input type="text" class="form-control" name="apellidos">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Contraseña</label>
          <input [type]="showPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="password" name="password">
        </div>
        <div class="mb-4">
          <label class="form-label fw-bold">Confirmar Contraseña</label>
          <input [type]="showPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword">
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="showPwd" [(ngModel)]="showPassword" name="showPassword">
          <label class="form-check-label" for="showPwd">Mostrar contraseña</label>
        </div>
        <button type="submit" class="btn btn-outline-secondary w-100 mb-4 py-2">Crear mi cuenta</button>

        <div class="text-center border-top pt-3">
          <p>¿Ya eres de los nuestros? <a routerLink="/login" class="text-terracotta fw-bold">Inicia sesión</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
