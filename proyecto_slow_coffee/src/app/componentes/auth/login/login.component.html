<!-- login.component.html -->
<div class="container py-5 my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
          <h2 class="card-title text-center mb-4" style="color: #6B4423;">Iniciar Sesión</h2>

          <form (ngSubmit)="onSubmit()">
            <div class="mb-4">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control form-control-lg"
                id="email"
                [(ngModel)]="email"
                name="email"
                placeholder="tu@email.com"
                required
              >
            </div>

            <div class="mb-4">
              <label for="password" class="form-label">Contraseña</label>
              <div class="input-group">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control form-control-lg"
                  id="password"
                  [(ngModel)]="password"
                  name="password"
                  placeholder="••••••••"
                  required
                  style="border-right: none;"
                >
                <button
                  class="btn btn-outline-secondary d-flex align-items-center"
                  type="button"
                  (click)="togglePassword()"
                  style="border-left: none; background-color: #fff; color: #6B4423; border-color: #dee2e6;"
                >
                  <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
                </button>
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-lg w-100 text-white fw-bold"
              style="background-color: #8B6239;"
            >
              Iniciar Sesión
            </button>
          </form>

          <hr class="my-4">

          <div class="text-center">
            <p class="mb-0">¿No tienes cuenta?
              <a routerLink="/registro" class="fw-bold" style="color: #D4A574; text-decoration: none;">Regístrate aquí</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
