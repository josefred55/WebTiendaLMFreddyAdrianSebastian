<div class="product-card rounded-4 bg-white h-100 shadow-sm overflow-hidden">
  <div class="product-img-wrapper">
    <img src="./img/productosFoto.png" alt="Café" class="img-fluid w-100">
  </div>

  <div class="p-4">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <span class="headline text-uppercase small fw-bold text-muted">{{etiqueta}}</span>
      <ng-content></ng-content> </div>

    <h5 class="product-name fw-bold mb-1">{{titulo}}</h5>
    <p class="text-secondary small mb-3">{{descripcion}}</p>

    <div class="mb-3">
      <span class="product-price fs-4 fw-bold text-dark">{{precio}}</span>
    </div>

    <div class="d-grid gap-2">
      <button (click)="agregarAlCarrito()" class="btn btn-dark-coffee rounded-pill shadow-sm">
        Añadir al carrito
      </button>

      <a [routerLink]="['/producto', id]" class="btn btn-outline-details rounded-pill">
        Ver más detalles
      </a>
    </div>
  </div>
</div>
